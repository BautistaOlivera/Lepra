# Render Blueprint: Lepra API (Backend) + PostgreSQL
# Deploy from dashboard: New > Blueprint > connect repo and select this file

databases:
  - name: lepra-db
    databaseName: lepra
    plan: free

services:
  - type: web
    name: lepra-api
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:lepra --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lepra-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
