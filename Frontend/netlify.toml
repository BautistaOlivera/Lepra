# Netlify – Lepra Frontend (Vite + React)
# Si conectas el repo desde la carpeta Frontend como base, usa esta config.

[build]
  command = "npm run build"
  publish = "dist"

# Redirigir SPA: todas las rutas a index.html para React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
